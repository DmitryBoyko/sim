services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sim
    ports:
      - "55435:5432"
    volumes:
      - sim_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/sim?sslmode=disable
      HTTP_PORT: "3000"
    depends_on:
      db:
        condition: service_healthy
    # Порт не пробрасываем наружу — доступ только через nginx

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"   # 80 на хосте часто занят (IIS и др.) — открывай http://localhost:8080
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
    depends_on:
      - app

volumes:
  sim_pgdata:
